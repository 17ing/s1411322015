<p class="auto-style2" data-path-to-node="4"><span class="auto-style4">你好！我是</span><b data-index-in-node="5" data-path-to-node="4"><span class="auto-style4">黃翊晴，可以叫我17</span></b></p>
<p class="auto-style2" data-path-to-node="4">
<img alt="" height="334" src="IMG_5620.JPG" width="271" /></p>
<p class="auto-style2" data-path-to-node="5">我的學習歷程比較特別，高中就讀於<b data-index-in-node="16" data-path-to-node="5">商業經營科</b>，大學轉向挑戰<b data-index-in-node="47" data-path-to-node="5">多媒體設計</b>領域。</p>
<p class="auto-style3" data-path-to-node="5" style="width: 865px">雖然起步的時間比別人晚了一些，在設計軟體與創作經驗上可能暫時落後，但我深知自己的不足，因此願意付出<b data-index-in-node="49" data-path-to-node="6">雙倍的努力</b>來填補這段差距。我擅長結合過去的商科邏輯與現在的設計創意，這讓我能從更務實的觀點切換到美學創作。</p>
